<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>🐯 FORTUNE TIGER 3D SLOT - MODO ULTRA</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
        background: #0a0a0a;
        font-family: 'Press Start 2P', Arial;
        text-align: center;
        color: #ffd700;
        overflow: hidden;
        margin: 0;
        position: relative;
    }

    /* Fundo animado com jungle + raios sutis */
    body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: 
            radial-gradient(circle at 30% 20%, rgba(255,215,0,0.15) 0%, transparent 60%),
            radial-gradient(circle at 70% 80%, rgba(255,100,0,0.15) 0%, transparent 60%),
            linear-gradient(45deg, #001a00 0%, #0a0a0a 100%);
        z-index: -3;
        animation: junglePulse 15s infinite alternate ease-in-out;
    }

    @keyframes junglePulse {
        0% { opacity: 0.6; }
        100% { opacity: 0.9; }
    }

    /* Tigres decorativos flutuando por TODO o site */
    .decor-tiger {
        position: fixed;
        font-size: 75px;
        opacity: 0.25;
        z-index: -2;
        pointer-events: none;
        filter: drop-shadow(0 0 25px gold);
        animation: decorFloat 14s infinite ease-in-out;
    }
    .decor-tiger:nth-child(odd) { animation-duration: 18s; animation-direction: alternate-reverse; }

    @keyframes decorFloat {
        0%   { transform: translateY(0) rotate(-8deg); }
        50%  { transform: translateY(-80px) rotate(8deg); }
        100% { transform: translateY(0) rotate(-8deg); }
    }

    /* Folhas caindo o tempo todo (bichinhos da jungle) */
    .leaf {
        position: fixed;
        font-size: 28px;
        z-index: -1;
        opacity: 0.6;
        animation: leafFall linear forwards;
        pointer-events: none;
    }
    @keyframes leafFall {
        to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    h1 {
        font-size: 42px;
        margin: 15px 0 5px;
        text-shadow: 
            0 0 15px gold,
            0 0 30px #ff4500,
            0 0 50px #ff0000;
        animation: titleGlow 2s infinite alternate;
        letter-spacing: 4px;
    }
    @keyframes titleGlow {
        from { text-shadow: 0 0 15px gold, 0 0 30px #ff4500; }
        to   { text-shadow: 0 0 35px gold, 0 0 70px #ff0000, 0 0 90px #ffd700; }
    }

    /* Container do jogo */
    .game-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 70px;
        margin: 20px auto;
        perspective: 1200px;
        position: relative;
    }

    /* Tigres 3D gigantes com olhos piscando + brilho */
    .tiger {
        font-size: 140px;
        transform-style: preserve-3d;
        animation: float3D 2.2s infinite ease-in-out;
        filter: drop-shadow(0 0 30px #ff4500);
    }
    .tiger::after {
        content: "🐯";
        display: block;
        animation: blink 2.8s infinite;
    }
    @keyframes float3D {
        0%   { transform: rotateY(-15deg) translateY(0); }
        50%  { transform: rotateY(15deg) translateY(-35px); }
        100% { transform: rotateY(-15deg) translateY(0); }
    }
    @keyframes blink {
        0%, 92%, 100% { opacity: 1; }
        94%, 97% { opacity: 0; }
    }
    .tiger.win {
        animation: tigerSuperWin 0.4s infinite alternate !important;
    }
    @keyframes tigerSuperWin {
        0%   { transform: scale(1) rotateY(-15deg); filter: brightness(1.8) hue-rotate(30deg); }
        100% { transform: scale(1.25) rotateY(15deg); filter: brightness(2.5) hue-rotate(-30deg); }
    }

    /* Slot */
    #slot {
        display: grid;
        grid-template-columns: repeat(3, 120px);
        gap: 14px;
        padding: 15px;
        background: rgba(0,0,0,0.7);
        border: 8px solid #ffd700;
        border-radius: 20px;
        box-shadow: 
            0 0 40px gold inset,
            0 0 80px #ff4500;
    }
    .cell {
        width: 120px;
        height: 120px;
        background: #1a1a1a;
        border: 5px solid #ffd700;
        border-radius: 15px;
        font-size: 68px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 20px gold inset;
        transition: all 0.3s;
    }
    .cell.win {
        animation: cellGlow 0.4s infinite alternate;
        transform: scale(1.15);
    }
    @keyframes cellGlow {
        0%   { box-shadow: 0 0 30px gold, 0 0 60px #ff0; }
        100% { box-shadow: 0 0 70px gold, 0 0 120px #ff4500; }
    }

    /* Painéis */
    .panel {
        background: rgba(20,20,20,0.85);
        padding: 12px 25px;
        margin: 12px auto;
        border-radius: 12px;
        border: 3px solid gold;
        display: inline-block;
        box-shadow: 0 0 25px rgba(255,215,0,0.6);
    }
    #saldo {
        color: #00ff00;
        font-size: 24px;
        text-shadow: 0 0 15px lime;
    }

    /* Botões com mais brilho e pulso */
    button {
        padding: 14px 28px;
        font-size: 18px;
        background: linear-gradient(#ffd700, #ffaa00);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        margin: 8px;
        transition: all 0.2s;
        box-shadow: 0 0 20px gold;
        text-shadow: 0 0 8px black;
    }
    button:hover {
        transform: scale(1.12) rotate(3deg);
        box-shadow: 0 0 45px #ff4500;
    }
    button:active {
        transform: scale(0.95);
    }
    #spinBtn {
        font-size: 22px;
        padding: 18px 50px;
        background: linear-gradient(#ff4500, #ffd700);
        animation: spinPulse 1.5s infinite alternate;
    }
    @keyframes spinPulse {
        from { box-shadow: 0 0 20px #ff0; }
        to   { box-shadow: 0 0 60px #ff4500, 0 0 90px #ff0; }
    }

    /* Mensagem de vitória gigante */
    #msg {
        font-size: 28px;
        min-height: 60px;
        text-shadow: 0 0 20px gold;
        animation: msgPop 0.6s;
    }
    @keyframes msgPop {
        0% { transform: scale(0.3); opacity: 0; }
        70% { transform: scale(1.3); }
        100% { transform: scale(1); }
    }

    /* Partículas melhoradas */
    .particle {
        position: fixed;
        font-size: 22px;
        pointer-events: none;
        z-index: 999;
        animation: particleMove 1.8s linear forwards;
        text-shadow: 0 0 10px gold;
    }
    .particle.tiger { font-size: 32px; }
    @keyframes particleMove {
        to { 
            transform: translateY(-220px) translateX(80px) rotate(360deg); 
            opacity: 0; 
        }
    }

    /* Moedas caindo mais intensas */
    .coin {
        position: fixed;
        font-size: 26px;
        z-index: 998;
        animation: coinFall 2.8s linear forwards;
    }
    @keyframes coinFall {
        to { transform: translateY(120vh) rotate(1080deg); opacity: 0; }
    }

    /* Raios + explosão de luz */
    .lightning {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        background: radial-gradient(circle, rgba(255,255,255,0.95), transparent 50%);
        animation: flash 0.2s linear forwards;
        z-index: 1000;
    }
    @keyframes flash { 0%{opacity:1} 100%{opacity:0} }

    /* Tremor mais forte */
    .shake { animation: shake 0.6s; }
    @keyframes shake {
        0%,100%{transform:translate(0)}
        10%{transform:translate(-8px,-8px)}
        20%{transform:translate(8px,8px)}
        30%{transform:translate(-8px,8px)}
        40%{transform:translate(8px,-8px)}
        50%{transform:translate(-5px,5px)}
        60%{transform:translate(5px,-5px)}
        70%{transform:translate(-4px,4px)}
        80%{transform:translate(4px,-4px)}
    }

    /* Jackpot banner no topo */
    #jackpot-banner {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        background: linear-gradient(90deg, #ff0000, #ffd700, #ff0000);
        padding: 8px 30px;
        border-radius: 30px;
        font-size: 18px;
        font-weight: bold;
        box-shadow: 0 0 30px #ff0;
        animation: jackpotBanner 3s infinite;
        z-index: 9999;
    }
    @keyframes jackpotBanner {
        0%,100% { transform: translateX(-50%) scale(1); }
        50% { transform: translateX(-50%) scale(1.08); }
    }
</style>
</head>
<body>

<div id="jackpot-banner">🐯 JACKPOT PROGRESSIVO ATIVADO - ATÉ ×50! 🔥</div>

<h1>🐯 FORTUNE TIGER 3D ULTRA</h1>

<div class="panel">Saldo: R$ <span id="saldo">100000</span></div>

<div class="panel">
    Aposta
    <button onclick="betDown()">−</button>
    <span id="bet" style="font-size:22px;">20</span>
    <button onclick="betUp()">+</button>
    <button onclick="maxBet()">MAX</button>
</div>

<div class="panel">
    <button id="spinBtn">🎰 GIRAR AGORA!</button>
    <button id="autoBtn">⏯ AUTO</button>
    <button id="turboBtn">⚡ TURBO</button>
    <button id="freeBtn">🎟 GRÁTIS (0)</button>
</div>

<div class="game-container">
    <!-- Tigre esquerdo gigante -->
    <div class="tiger" id="tigerL"></div>
    
    <div id="slot">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    
    <!-- Tigre direito gigante -->
    <div class="tiger" id="tigerR"></div>
</div>

<div class="panel" id="msg" style="font-size:32px; color:#ff0;">Pronto para o tigre?</div>

<!-- Tigres decorativos em TODOS os cantos -->
<div class="decor-tiger" style="top:12%; left:5%; animation-delay:0s;">🐯</div>
<div class="decor-tiger" style="top:18%; right:6%; animation-delay:2s;">🐯</div>
<div class="decor-tiger" style="bottom:15%; left:8%; animation-delay:4s;">🐯</div>
<div class="decor-tiger" style="bottom:22%; right:7%; animation-delay:6s;">🐯</div>
<div class="decor-tiger" style="top:45%; left:3%; animation-delay:1.5s; font-size:55px;">🐯</div>
<div class="decor-tiger" style="top:55%; right:4%; animation-delay:3.5s; font-size:55px;">🐯</div>
<div class="decor-tiger" style="bottom:35%; left:12%; animation-delay:5s; font-size:48px;">🐯</div>
<div class="decor-tiger" style="top:8%; right:12%; animation-delay:7s; font-size:65px;">🐯</div>

<script>
let saldo = 100000;
let aposta = 20;
let turbo = false;
let autoSpin = false;
let autoInterval = null;
let freeSpins = 0;

const symbols = ["🐯","💰","🍀","👑","⭐"];
const multipliers = { "🐯": 12, "💰": 7, "🍀": 5, "👑": 8, "⭐": 4 };

const saldoEl = document.getElementById("saldo");
const betEl = document.getElementById("bet");
const msgEl = document.getElementById("msg");
const tigerL = document.getElementById("tigerL");
const tigerR = document.getElementById("tigerR");
const spinBtn = document.getElementById("spinBtn");
const autoBtn = document.getElementById("autoBtn");
const turboBtn = document.getElementById("turboBtn");
const freeBtn = document.getElementById("freeBtn");
const cells = document.querySelectorAll(".cell");

// Atualiza UI
function atualizar() {
    saldoEl.innerText = saldo.toLocaleString('pt-BR');
    betEl.innerText = aposta;
}

// Botões aposta
function betUp() { if(aposta < 500) aposta += 10; atualizar(); }
function betDown() { if(aposta > 10) aposta -= 10; atualizar(); }
function maxBet() { aposta = 500; atualizar(); }

// Turbo
turboBtn.addEventListener("click", () => {
    turbo = !turbo;
    turboBtn.style.background = turbo ? "#ff4500" : "linear-gradient(#ffd700, #ffaa00)";
    turboBtn.innerText = turbo ? "⚡ TURBO ON" : "⚡ TURBO";
});

// Auto
autoBtn.addEventListener("click", () => {
    autoSpin = !autoSpin;
    autoBtn.style.background = autoSpin ? "#ff4500" : "linear-gradient(#ffd700, #ffaa00)";
    if (autoSpin) {
        autoInterval = setInterval(() => {
            if (saldo >= aposta) spin();
            else stopAuto();
        }, turbo ? 350 : 750);
    } else stopAuto();
});
function stopAuto() {
    clearInterval(autoInterval);
    autoSpin = false;
    autoBtn.style.background = "linear-gradient(#ffd700, #ffaa00)";
}

// Folhas caindo no fundo o tempo todo
function createLeaf() {
    const leaf = document.createElement("div");
    leaf.className = "leaf";
    leaf.innerHTML = Math.random() > 0.5 ? "🍃" : "🌿";
    leaf.style.left = Math.random() * 100 + "vw";
    leaf.style.top = "-30px";
    leaf.style.animationDuration = (Math.random() * 8 + 9) + "s";
    document.body.appendChild(leaf);
    setTimeout(() => leaf.remove(), 18000);
}
setInterval(createLeaf, 220);

// Partículas extras no fundo
function backgroundParticles() {
    for (let i = 0; i < 3; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = Math.random() * 100 + "vw";
        p.style.top = Math.random() * 70 + "vh";
        p.innerHTML = "✨";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 2500);
    }
}
setInterval(backgroundParticles, 800);

// Função principal de giro
function spin() {
    if (saldo < aposta) {
        msgEl.innerHTML = "💸 SALDO INSUFICIENTE!";
        msgEl.style.color = "#ff0000";
        setTimeout(() => { msgEl.style.color = "#ff0"; }, 1500);
        return;
    }

    // Efeito botão
    spinBtn.style.transform = "scale(1.3) rotate(12deg)";
    setTimeout(() => spinBtn.style.transform = "", 180);

    saldo -= aposta;
    atualizar();

    // Giro das células com rotação 3D forte
    const steps = turbo ? 9 : 16;
    cells.forEach((c, i) => {
        let count = 0;
        const int = setInterval(() => {
            c.textContent = symbols[Math.floor(Math.random() * symbols.length)];
            c.style.transform = `rotateX(${count * 45}deg) scale(1.1)`;
            count++;
            if (count > steps) {
                clearInterval(int);
                c.style.transform = "";
            }
        }, turbo ? 22 : 32);
    });

    // Explosão de partículas durante giro
    for (let i = 0; i < 35; i++) {
        let part = document.createElement("div");
        part.className = "particle";
        part.style.left = Math.random() * 100 + "vw";
        part.style.top = "35vh";
        part.innerHTML = Math.random() > 0.7 ? "🐯" : "✨";
        if (Math.random() > 0.8) part.classList.add("tiger");
        document.body.appendChild(part);
        setTimeout(() => part.remove(), 1600);
    }

    // Resultado final
    setTimeout(() => {
        let results = [];
        cells.forEach(c => {
            let sym = symbols[Math.floor(Math.random() * symbols.length)];
            c.textContent = sym;
            c.classList.remove("win");
            results.push(sym);
        });
        checkWin(results);
        atualizar();
    }, turbo ? 380 : 620);
}

// Vitória com multiplicadores + efeitos insanos
function checkWin(results) {
    let premioTotal = 0;
    let linhas = 0;
    let tigerLines = 0;

    // Linha 1
    if (results[0] === results[1] && results[1] === results[2]) {
        const mult = multipliers[results[0]] || 5;
        premioTotal += aposta * mult;
        linhas++;
        if (results[0] === "🐯") tigerLines++;
    }
    // Linha 2
    if (results[3] === results[4] && results[4] === results[5]) {
        const mult = multipliers[results[3]] || 5;
        premioTotal += aposta * mult;
        linhas++;
        if (results[3] === "🐯") tigerLines++;
    }
    // Linha 3
    if (results[6] === results[7] && results[7] === results[8]) {
        const mult = multipliers[results[6]] || 5;
        premioTotal += aposta * mult;
        linhas++;
        if (results[6] === "🐯") tigerLines++;
    }

    if (premioTotal > 0) {
        saldo += premioTotal;
        msgEl.innerHTML = `🔥 JACKPOT ×${linhas} <br>R$ ${premioTotal}`;
        msgEl.style.color = "#00ff00";
        
        // Efeitos insanos de vitória
        cells.forEach(c => c.classList.add("win"));
        tigerL.classList.add("win");
        tigerR.classList.add("win");

        // Raios + flashes
        for (let i = 0; i < 8; i++) {
            setTimeout(() => {
                let flash = document.createElement("div");
                flash.className = "lightning";
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 180);
            }, i * 110);
        }

        // Tremor forte
        document.body.classList.add("shake");
        setTimeout(() => document.body.classList.remove("shake"), 700);

        // Moedas + tigres voando
        for (let i = 0; i < 65; i++) {
            let coin = document.createElement("div");
            coin.className = "coin";
            coin.innerHTML = Math.random() > 0.6 ? "💰" : "🐯";
            coin.style.left = Math.random() * 100 + "vw";
            coin.style.animationDuration = (2 + Math.random() * 2) + "s";
            document.body.appendChild(coin);
            setTimeout(() => coin.remove(), 3800);
        }

        // Partículas especiais
        for (let i = 0; i < 55; i++) {
            let part = document.createElement("div");
            part.className = "particle";
            part.style.left = Math.random() * 100 + "vw";
            part.style.top = "30vh";
            part.innerHTML = "✨";
            if (Math.random() > 0.75) part.innerHTML = "🐯";
            document.body.appendChild(part);
            setTimeout(() => part.remove(), 2200);
        }

        // Se tiver tigre → efeito extra
        if (tigerLines > 0) {
            setTimeout(() => {
                msgEl.innerHTML += `<br>🐯 TIGRE DOURADO ×${tigerLines * 2}!`;
            }, 600);
        }

        setTimeout(() => {
            tigerL.classList.remove("win");
            tigerR.classList.remove("win");
            cells.forEach(c => c.classList.remove("win"));
            msgEl.style.color = "#ff0";
        }, 2200);

    } else {
        msgEl.innerHTML = "😿 Tigre dormiu... Tente outra vez!";
        msgEl.style.color = "#ff8800";
        setTimeout(() => msgEl.style.color = "#ff0", 1400);
    }
}

// Inicia tudo
atualizar();
spinBtn.addEventListener("click", spin);

// Demo: uma folha a cada 180ms no fundo
setInterval(() => {
    if (Math.random() > 0.4) createLeaf();
}, 180);

// Dica inicial
setTimeout(() => {
    msgEl.innerHTML = "🐯 CLIQUE EM GIRAR E BOA SORTE!";
}, 1200);
</script>

</body>
</html>
